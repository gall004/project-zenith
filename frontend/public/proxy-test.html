<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    const originalFetch = window.fetch;
    window.fetch = async function(...args) {
      if (typeof args[0] === 'string' && args[0].includes('generateChatToken')) {
        console.log('--- GENERATE CHAT TOKEN PAYLOAD ---');
        console.log(args[1].body);
      }
      return originalFetch.apply(this, args);
    };
  </script>
  <script defer src="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.15/chat-messenger.js"></script>
</head>
<body>
  <script>
    window.addEventListener("chat-messenger-loaded", () => {
      chatSdk.registerContext(
        chatSdk.prebuilts.ces.createContext({
          deploymentName: "projects/825463420635/locations/us/apps/3ef188f6-f7e8-4035-8a07-6a7dec9beab5/deployments/d2898b35-89e9-43e5-a667-844c94017c0c",
          tokenBroker: {
            enableTokenBroker: true,
            enableRecaptcha: true,
          },
        }),
      );
    });
  </script>
  <chat-messenger url-allowlist="*">
    <chat-messenger language-code="en" max-query-length="-1">
      <chat-messenger-chat-bubble chat-title="Ask Zenith"></chat-messenger-chat-bubble>
    </chat-messenger>
  </chat-messenger>
</body>
</html>
